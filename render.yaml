databases:
  - name: smartseason-db
    plan: free

services:
  - type: web
    name: smartseason-backend
    runtime: node
    plan: free
    buildCommand: npm --prefix smartseason-backend install && npx --prefix smartseason-backend prisma generate --schema smartseason-backend/prisma/schema.prisma && npx --prefix smartseason-backend tsc -p smartseason-backend/tsconfig.json
    startCommand: npx --prefix smartseason-backend prisma migrate deploy --schema smartseason-backend/prisma/schema.prisma && node smartseason-backend/dist/main.js
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: smartseason-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION
        value: 24h
      - key: FRONTEND_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false

  - type: web
    name: smartseason-frontend
    runtime: static
    buildCommand: npm --prefix smartseason-frontend install && npm --prefix smartseason-frontend run build
    staticPublishPath: smartseason-frontend/dist/smartseason-frontend/browser
    envVars:
      - key: NODE_VERSION
        value: 20
    routes:
      - type: rewrite
        source: /*
        destination: /index.html