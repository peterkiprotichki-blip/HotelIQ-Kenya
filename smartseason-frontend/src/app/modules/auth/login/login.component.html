<div class="min-h-screen flex items-center justify-center bg-gray-50 dark:bg-slate-900 px-4 transition-colors duration-200">
  <div class="w-full max-w-md">
    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="inline-flex w-14 h-14 rounded-2xl items-center justify-center mb-4" [style.background-color]="themeService.accent">
        <i class="fas fa-seedling text-white text-2xl"></i>
      </div>
      <h1 class="text-3xl font-bold text-gray-800 dark:text-gray-100">SmartSeason</h1>
      <p class="text-gray-500 dark:text-gray-400 mt-1">Field Monitoring System</p>
    </div>

    <!-- Card -->
    <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-lg border border-gray-200 dark:border-slate-700 p-6 sm:p-8">
      <!-- Error / Success -->
      <div *ngIf="error" class="mb-4 p-3 rounded-lg bg-red-50 dark:bg-red-900/30 border border-red-200 dark:border-red-800 text-red-700 dark:text-red-300 text-sm">
        {{ error }}
      </div>
      <div *ngIf="success" class="mb-4 p-3 rounded-lg bg-green-50 dark:bg-green-900/30 border border-green-200 dark:border-green-800 text-green-700 dark:text-green-300 text-sm">
        {{ success }}
      </div>

      <!-- Login Form -->
      <div *ngIf="mode === 'login'">
        <h2 class="text-xl font-semibold text-gray-800 dark:text-gray-100 mb-6">Sign In</h2>

        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Email</label>
            <input
              type="email"
              [(ngModel)]="email"
              (keyup.enter)="login()"
              class="w-full px-3 py-2.5 rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-900 dark:text-gray-100 focus:ring-2 focus:border-transparent outline-none transition-colors"
              [style.--tw-ring-color]="themeService.accent"
              placeholder="your@email.com"
            />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Password</label>
            <input
              type="password"
              [(ngModel)]="password"
              (keyup.enter)="login()"
              class="w-full px-3 py-2.5 rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-900 dark:text-gray-100 focus:ring-2 focus:border-transparent outline-none transition-colors"
              placeholder="••••••••"
            />
          </div>
          <button
            (click)="login()"
            [disabled]="loading"
            class="w-full py-2.5 rounded-lg text-white font-medium transition-opacity"
            [style.background-color]="themeService.accent"
            [class.opacity-50]="loading"
          >
            <span *ngIf="!loading">Sign In</span>
            <span *ngIf="loading"><i class="fas fa-spinner fa-spin mr-2"></i>Signing in...</span>
          </button>
        </div>

        <!-- Divider -->
        <div class="flex items-center my-6">
          <div class="flex-1 border-t border-gray-200 dark:border-slate-700"></div>
          <span class="px-3 text-sm text-gray-400 dark:text-gray-500">or</span>
          <div class="flex-1 border-t border-gray-200 dark:border-slate-700"></div>
        </div>

        <!-- Google Login -->
        <button
          (click)="googleLogin()"
          class="w-full py-2.5 rounded-lg border border-gray-300 dark:border-slate-600 text-gray-700 dark:text-gray-300 font-medium hover:bg-gray-50 dark:hover:bg-slate-700 transition-colors flex items-center justify-center gap-2"
        >
          <i class="fab fa-google"></i> Sign in with Google
        </button>

        <p class="text-center text-sm text-gray-500 dark:text-gray-400 mt-6">
          Don't have an account?
          <button (click)="mode = 'signup'; error = ''" class="font-medium hover:underline" [style.color]="themeService.accent">Sign up</button>
        </p>

        <!-- Tenant Portal link -->
        <div class="mt-6 pt-5 border-t border-gray-100 dark:border-slate-700">
          <p class="text-center text-xs text-gray-400 dark:text-gray-500 mb-3">Are you a field agent?</p>
          <a routerLink="/tenant-portal/login"
            class="flex items-center justify-center gap-2 w-full py-2.5 rounded-lg border-2 font-semibold text-sm transition-colors hover:bg-opacity-10"
            [style.border-color]="themeService.accent"
            [style.color]="themeService.accent"
            [style.background]="'transparent'"
          >
            <i class="fas fa-tractor"></i>
            Field Agent Login
          </a>
        </div>
      </div>

      <!-- Signup Form -->
      <div *ngIf="mode === 'signup'">
        <h2 class="text-xl font-semibold text-gray-800 dark:text-gray-100 mb-6">Create Account</h2>

        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Full Name</label>
            <input
              type="text"
              [(ngModel)]="signupName"
              class="w-full px-3 py-2.5 rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-900 dark:text-gray-100 focus:ring-2 focus:border-transparent outline-none transition-colors"
              placeholder="John Doe"
            />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Email</label>
            <input
              type="email"
              [(ngModel)]="signupEmail"
              class="w-full px-3 py-2.5 rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-900 dark:text-gray-100 focus:ring-2 focus:border-transparent outline-none transition-colors"
              placeholder="your@email.com"
            />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Password</label>
            <input
              type="password"
              [(ngModel)]="signupPassword"
              (keyup.enter)="signup()"
              class="w-full px-3 py-2.5 rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-900 dark:text-gray-100 focus:ring-2 focus:border-transparent outline-none transition-colors"
              placeholder="Min 6 characters"
            />
          </div>
          <button
            (click)="signup()"
            [disabled]="loading"
            class="w-full py-2.5 rounded-lg text-white font-medium transition-opacity"
            [style.background-color]="themeService.accent"
            [class.opacity-50]="loading"
          >
            <span *ngIf="!loading">Create Account</span>
            <span *ngIf="loading"><i class="fas fa-spinner fa-spin mr-2"></i>Creating...</span>
          </button>
        </div>

        <p class="text-center text-sm text-gray-500 dark:text-gray-400 mt-6">
          Already have an account?
          <button (click)="mode = 'login'; error = ''" class="font-medium hover:underline" [style.color]="themeService.accent">Sign in</button>
        </p>
      </div>
    </div>
  </div>
</div>
