databases:
  - name: smartseason-db
    plan: free

services:
  - type: web
    name: smartseason-backend
    runtime: node
    plan: free
    rootDir: smartseason-backend
    buildCommand: npm install && npx prisma generate --schema prisma/schema.prisma && npx tsc -p tsconfig.json
    startCommand: npx prisma migrate deploy --schema prisma/schema.prisma && node dist/main.js
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: smartseason-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION
        value: 24h
      - key: FRONTEND_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false

  - type: web
    name: smartseason-frontend
    runtime: static
    rootDir: smartseason-frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist/smartseason-frontend/browser
    envVars:
      - key: NODE_VERSION
        value: 20
    routes:
      - type: rewrite
        source: /*
        destination: /index.html