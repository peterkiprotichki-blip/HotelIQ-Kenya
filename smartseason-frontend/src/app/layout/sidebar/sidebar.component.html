<aside
  class="fixed left-0 top-0 h-full bg-white dark:bg-slate-800 border-r border-gray-200 dark:border-slate-700 z-40 transition-all duration-300 flex flex-col"
  [class.w-64]="!collapsed || isMobile"
  [class.w-16]="collapsed && !isMobile"
  [class.-translate-x-full]="isMobile && mobileHidden"
  [class.translate-x-0]="!isMobile || !mobileHidden"
>
  <!-- Logo -->
  <div class="flex items-center h-16 px-4 border-b border-gray-100 dark:border-slate-700">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 rounded-lg flex items-center justify-center" [style.background-color]="themeService.accent">
        <i class="fas fa-seedling text-white text-sm"></i>
      </div>
      <span *ngIf="!collapsed || isMobile" class="text-lg font-bold text-gray-800 dark:text-gray-100">SmartSeason</span>
    </div>
  </div>

  <!-- Navigation -->
  <nav class="flex-1 py-4 px-2 space-y-1 overflow-y-auto">
    <a
      *ngFor="let item of navItems"
      [routerLink]="item.route"
      (click)="navigate.emit()"
      class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-all duration-200 cursor-pointer"
      [class.text-white]="isActive(item.route)"
      [class.text-gray-600]="!isActive(item.route)"
      [class.dark:text-gray-400]="!isActive(item.route)"
      [class.hover:bg-gray-100]="!isActive(item.route)"
      [class.dark:hover:bg-slate-700]="!isActive(item.route)"
      [class.justify-center]="collapsed && !isMobile"
      [style.background-color]="isActive(item.route) ? themeService.accent : 'transparent'"
    >
      <i [class]="item.icon" class="text-base w-5 text-center"></i>
      <span *ngIf="!collapsed || isMobile">{{ item.label }}</span>
    </a>
  </nav>

  <!-- Collapse toggle (desktop only) -->
  <div class="p-3 border-t border-gray-100 dark:border-slate-700 hidden lg:block">
    <button
      (click)="toggle.emit()"
      class="w-full flex items-center justify-center gap-2 px-3 py-2 rounded-lg text-sm text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-slate-700 transition-colors"
    >
      <i class="fas" [class.fa-chevron-left]="!collapsed" [class.fa-chevron-right]="collapsed"></i>
      <span *ngIf="!collapsed">Collapse</span>
    </button>
  </div>
</aside>
