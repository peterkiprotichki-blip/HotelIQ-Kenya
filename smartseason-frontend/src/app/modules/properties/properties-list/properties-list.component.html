<div>
  <div class="flex flex-row items-center justify-between gap-4 mb-6">
    <h1 class="text-2xl font-bold text-gray-800 dark:text-gray-100">Properties</h1>
    <button (click)="openCreateModal()" class="inline-flex items-center gap-2 px-4 py-2 rounded-lg text-white text-sm font-medium whitespace-nowrap flex-shrink-0" [style.background-color]="themeService.accent">
      <i class="fas fa-plus"></i> Add Property
    </button>
  </div>

  <!-- Filters -->
  <div class="flex flex-col sm:flex-row gap-3 mb-6">
    <div class="flex-1">
      <input
        type="text"
        [(ngModel)]="search"
        (input)="onSearch()"
        placeholder="Search properties..."
        class="w-full px-3 py-2 rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-gray-900 dark:text-gray-100 text-sm outline-none"
      />
    </div>
    <select [(ngModel)]="statusFilter" (change)="onFilterChange()" class="px-3 py-2 rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-gray-900 dark:text-gray-100 text-sm outline-none">
      <option value="">All Status</option>
      <option *ngFor="let s of statusOptions" [value]="s">{{ s | titlecase }}</option>
    </select>
    <select [(ngModel)]="typeFilter" (change)="onFilterChange()" class="px-3 py-2 rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-gray-900 dark:text-gray-100 text-sm outline-none">
      <option value="">All Types</option>
      <option *ngFor="let t of typeOptions" [value]="t">{{ t.replace('_', ' ') | titlecase }}</option>
    </select>
  </div>

  <!-- Loading -->
  <div *ngIf="loading" class="flex items-center justify-center py-20">
    <i class="fas fa-spinner fa-spin text-2xl" [style.color]="themeService.accent"></i>
  </div>

  <!-- Table -->
  <div *ngIf="!loading" class="bg-white dark:bg-slate-800 rounded-xl border border-gray-200 dark:border-slate-700 overflow-hidden">
    <div class="overflow-x-auto">
      <table class="w-full text-sm">
        <thead>
          <tr class="border-b border-gray-200 dark:border-slate-700 bg-gray-50 dark:bg-slate-700/50">
            <th class="text-left px-4 py-3 font-medium text-gray-600 dark:text-gray-300">Name</th>
            <th class="text-left px-4 py-3 font-medium text-gray-600 dark:text-gray-300 hidden sm:table-cell">Type</th>
            <th class="text-left px-4 py-3 font-medium text-gray-600 dark:text-gray-300 hidden md:table-cell">Address</th>
            <th class="text-left px-4 py-3 font-medium text-gray-600 dark:text-gray-300 hidden lg:table-cell">Floors</th>
            <th class="text-left px-4 py-3 font-medium text-gray-600 dark:text-gray-300 hidden xl:table-cell">Owner</th>
            <th class="text-left px-4 py-3 font-medium text-gray-600 dark:text-gray-300">Status</th>
            <th class="text-center px-4 py-3 font-medium text-gray-600 dark:text-gray-300">Action</th>
          </tr>
        </thead>
        <tbody>
          <tr
            *ngFor="let prop of properties"
            class="border-b border-gray-100 dark:border-slate-700 hover:bg-gray-50 dark:hover:bg-slate-700/30 transition-colors"
          >
            <td class="px-4 py-3">
              <p class="font-medium text-gray-800 dark:text-gray-100">{{ prop.name }}</p>
              <p class="text-xs text-gray-500 dark:text-gray-400" *ngIf="prop.propertyCode">{{ prop.propertyCode }}</p>
            </td>
            <td class="px-4 py-3 text-gray-600 dark:text-gray-300 hidden sm:table-cell capitalize">{{ prop.type }}</td>
            <td class="px-4 py-3 text-gray-600 dark:text-gray-300 hidden md:table-cell">{{ prop.address }}</td>
            <td class="px-4 py-3 text-gray-600 dark:text-gray-300 hidden lg:table-cell">{{ prop.floors || 0 }}</td>
            <td class="px-4 py-3 text-gray-600 dark:text-gray-300 hidden xl:table-cell">{{ prop.owner || '-' }}</td>
            <td class="px-4 py-3">
              <span class="px-2 py-1 rounded-full text-xs font-medium" [ngClass]="getStatusClass(prop.status)">{{ prop.status | titlecase }}</span>
            </td>
            <td class="px-4 py-3 text-center space-x-3">
              <button
                (click)="openViewModal(prop)"
                class="text-sm font-medium text-cyan-600 dark:text-cyan-400 hover:text-cyan-800 dark:hover:text-cyan-300 transition-colors"
              >
                <i class="fas fa-eye mr-1"></i> View
              </button>
              <button
                (click)="openEditModal(prop)"
                class="text-sm font-medium text-blue-600 dark:text-blue-400 hover:text-blue-800 dark:hover:text-blue-300 transition-colors"
              >
                <i class="fas fa-edit mr-1"></i> Edit
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <div *ngIf="properties.length === 0" class="text-center py-12 text-gray-500 dark:text-gray-400">
      <i class="fas fa-building text-3xl mb-3 block"></i>
      <p>No properties found</p>
    </div>

    <!-- Pagination -->
    <div *ngIf="totalPages > 1" class="flex items-center justify-between px-4 py-3 border-t border-gray-200 dark:border-slate-700">
      <span class="text-sm text-gray-500 dark:text-gray-400">{{ total }} total</span>
      <div class="flex gap-1">
        <button *ngFor="let p of [].constructor(totalPages); let i = index"
          (click)="goToPage(i + 1)"
          class="w-8 h-8 rounded text-sm font-medium transition-colors"
          [class.text-white]="page === i + 1"
          [style.background-color]="page === i + 1 ? themeService.accent : 'transparent'"
          [class.text-gray-600]="page !== i + 1"
          [class.hover:bg-gray-100]="page !== i + 1"
        >{{ i + 1 }}</button>
      </div>
    </div>
  </div>

  <!-- Form Modal -->
  <app-property-form
    [isOpen]="formModalOpen"
    [property]="selectedProperty"
    (close)="closeFormModal()"
    (save)="onPropertySaved()"
  ></app-property-form>

  <!-- View Modal -->
  <app-property-view
    [isOpen]="viewModalOpen"
    [property]="viewProperty"
    (close)="closeViewModal()"
    (edit)="onViewPropertyEdit($event)"
  ></app-property-view>
</div>
