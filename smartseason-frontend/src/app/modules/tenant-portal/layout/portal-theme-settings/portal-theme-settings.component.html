<!-- Backdrop -->
<div
  *ngIf="open"
  class="fixed inset-0 z-[400] bg-black/30 dark:bg-black/50 backdrop-blur-sm"
  (click)="closePanel()"
></div>

<!-- Panel -->
<div
  *ngIf="open"
  class="fixed top-14 right-3 sm:right-5 z-[401] w-72 bg-white dark:bg-slate-800 rounded-2xl shadow-2xl border border-gray-100 dark:border-slate-700 overflow-hidden"
  style="max-height: calc(100vh - 80px); overflow-y: auto;"
>
  <!-- Header -->
  <div class="flex items-center justify-between px-5 pt-5 pb-3 border-b border-gray-100 dark:border-slate-700">
    <div class="flex items-center gap-2">
      <i class="fas fa-palette text-sm" [style.color]="accentHex"></i>
      <span class="font-semibold text-sm text-gray-800 dark:text-gray-100">Appearance</span>
    </div>
    <button
      (click)="closePanel()"
      class="w-6 h-6 flex items-center justify-center rounded-full hover:bg-gray-100 dark:hover:bg-slate-700 text-gray-400 dark:text-gray-500 transition-colors"
    >
      <i class="fas fa-times text-xs"></i>
    </button>
  </div>

  <div class="px-5 py-4 space-y-5">

    <!-- ── Dark Mode Toggle ── -->
    <div class="flex items-center justify-between">
      <div>
        <p class="text-sm font-semibold text-gray-700 dark:text-gray-200">Dark Mode</p>
        <p class="text-xs text-gray-400 dark:text-gray-500 mt-0.5">
          {{ isDark ? 'Switch to light' : 'Switch to dark' }}
        </p>
      </div>
      <button
        (click)="toggleDark()"
        class="relative w-12 h-6 rounded-full transition-colors duration-300 focus:outline-none focus:ring-2 focus:ring-offset-2 flex-shrink-0"
        [style.background-color]="isDark ? accentHex : '#e2e8f0'"
        [style.--tw-ring-color]="accentHex"
        role="switch"
        [attr.aria-checked]="isDark"
      >
        <span
          class="absolute top-0.5 left-0.5 w-5 h-5 bg-white rounded-full shadow-md transition-transform duration-300 flex items-center justify-center"
          [class.translate-x-6]="isDark"
        >
          <i
            [class]="isDark ? 'fas fa-moon' : 'fas fa-sun'"
            class="text-[9px]"
            [style.color]="isDark ? accentHex : '#f59e0b'"
          ></i>
        </span>
      </button>
    </div>

    <!-- ── Hue Slider ── -->
    <div>
      <p class="text-sm font-semibold text-gray-700 dark:text-gray-200 mb-3">Accent Color</p>

      <!-- Color preview + native picker -->
      <div class="flex items-center gap-3 mb-3">
        <div
          class="relative w-10 h-10 rounded-xl border-2 border-gray-200 dark:border-slate-600 cursor-pointer flex-shrink-0 overflow-hidden shadow-sm"
          title="Click to open color picker"
        >
          <div class="absolute inset-0 rounded-xl" [style.background]="accentHex"></div>
          <input
            type="color"
            [value]="accentHex"
            (input)="onColorInput($event)"
            class="absolute inset-0 w-full h-full opacity-0 cursor-pointer"
            title="Pick exact color"
          />
        </div>
        <div class="flex-1 min-w-0">
          <p class="text-xs text-gray-400 dark:text-gray-500 uppercase tracking-wide mb-1">Hue · {{ hue }}°</p>
          <!-- Hue rail -->
          <div class="relative h-4 rounded-full overflow-hidden cursor-pointer"
               style="background: linear-gradient(to right,#ff0000 0%,#ffff00 17%,#00ff00 33%,#00ffff 50%,#0000ff 67%,#ff00ff 83%,#ff0000 100%)">
            <input
              type="range"
              min="0" max="359"
              [value]="hue"
              (input)="onHueChange($event)"
              class="absolute inset-0 w-full h-full opacity-0 cursor-pointer"
              style="margin: 0;"
            />
            <!-- Thumb indicator -->
            <div
              class="absolute top-0.5 w-3 h-3 rounded-full border-2 border-white shadow-md pointer-events-none transition-all"
              [style.left]="'calc(' + (hue/359*100) + '% - 6px)'"
              [style.background]="accentHex"
            ></div>
          </div>
        </div>
      </div>

      <!-- Palette preview strip -->
      <div class="flex gap-1 rounded-lg overflow-hidden h-5">
        <div class="flex-1" style="background: var(--accent-100)"></div>
        <div class="flex-1" style="background: var(--accent-200)"></div>
        <div class="flex-1" style="background: var(--accent-300)"></div>
        <div class="flex-1" style="background: var(--accent-400)"></div>
        <div class="flex-1" style="background: var(--accent-500)"></div>
        <div class="flex-1" style="background: var(--accent-600)"></div>
        <div class="flex-1" style="background: var(--accent-700)"></div>
        <div class="flex-1" style="background: var(--accent-800)"></div>
        <div class="flex-1" style="background: var(--accent-900)"></div>
      </div>
    </div>

    <!-- ── Preset Colors ── -->
    <div>
      <p class="text-xs font-medium text-gray-400 dark:text-gray-500 uppercase tracking-wide mb-2.5">Quick Presets</p>
      <div class="grid grid-cols-4 gap-2">
        <button
          *ngFor="let p of presets"
          (click)="applyPreset(p.hex)"
          class="group flex flex-col items-center gap-1.5 focus:outline-none"
          [title]="p.name"
        >
          <div
            class="w-8 h-8 rounded-full transition-transform duration-150 group-hover:scale-110 shadow-sm relative"
            [style.background]="p.hex"
          >
            <div
              *ngIf="accentHex === p.hex"
              class="absolute inset-0 rounded-full ring-2 ring-offset-2 ring-gray-800 dark:ring-white"
            ></div>
          </div>
          <span class="text-[10px] text-gray-400 dark:text-gray-500 leading-none">{{ p.name }}</span>
        </button>
      </div>
    </div>

  </div>

  <!-- Footer note -->
  <div class="px-5 pb-4">
    <p class="text-[10px] text-gray-300 dark:text-gray-600 text-center">
      Saved to your browser automatically
    </p>
  </div>
</div>
