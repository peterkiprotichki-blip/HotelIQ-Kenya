<div class="min-h-screen flex items-end sm:items-center justify-center p-0 sm:p-6 transition-colors duration-200" style="background: linear-gradient(135deg, var(--accent-50) 0%, #f8fafc 100%)">
  <div class="w-full sm:max-w-sm bg-white dark:bg-slate-800 rounded-t-2xl sm:rounded-2xl shadow-2xl sm:shadow-xl p-7 sm:p-10 border-0 sm:border border-gray-100 dark:border-slate-700 transition-colors duration-200">

    <!-- Brand -->
    <div class="flex items-center gap-3 mb-7">
      <div class="w-11 h-11 rounded-xl flex items-center justify-center text-white text-lg flex-shrink-0" style="background: var(--accent-600)">
        <i class="fas fa-building"></i>
      </div>
      <div>
        <h1 class="text-lg font-bold text-gray-900 dark:text-gray-100 leading-tight">SmartSeason</h1>
        <p class="text-[10px] uppercase tracking-widest font-semibold mt-0.5" style="color: var(--accent-600)">Tenant Portal</p>
      </div>
    </div>

    <!-- Success state -->
    <div *ngIf="success" class="text-center py-4">
      <div class="w-16 h-16 rounded-full flex items-center justify-center text-2xl mx-auto mb-4" style="background: var(--accent-100); color: var(--accent-600)">
        <i class="fas fa-check"></i>
      </div>
      <h2 class="text-xl font-bold text-gray-900 dark:text-gray-100 mb-2">All set!</h2>
      <p class="text-sm text-gray-500 dark:text-gray-400">Your account is ready. Redirecting you to login...</p>
    </div>

    <!-- Invalid token -->
    <div *ngIf="!token && !success">
      <div class="bg-red-50 dark:bg-red-900/30 border border-red-200 dark:border-red-800 rounded-lg px-4 py-3 text-sm text-red-700 dark:text-red-300 mb-4">{{ error }}</div>
      <a routerLink="/tenant-portal/login" class="inline-flex items-center px-4 py-2 rounded-lg bg-gray-100 dark:bg-slate-700 text-gray-700 dark:text-gray-300 text-sm font-medium hover:bg-gray-200 dark:hover:bg-slate-600 transition-colors">
        Go to Login
      </a>
    </div>

    <!-- Setup form -->
    <ng-container *ngIf="token && !success">
      <h2 class="text-xl font-bold text-gray-900 dark:text-gray-100 mb-1">Set up your password</h2>
      <p class="text-sm text-gray-500 dark:text-gray-400 mb-5">You've been added to the SmartSeason tenant portal. Choose a secure password.</p>

      <div *ngIf="error" class="bg-red-50 dark:bg-red-900/30 border border-red-200 dark:border-red-800 rounded-lg px-4 py-3 text-sm text-red-700 dark:text-red-300 mb-4">{{ error }}</div>

      <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4">
        <div>
          <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1.5">New Password</label>
          <div class="relative">
            <input
              [type]="showPassword ? 'text' : 'password'"
              formControlName="password"
              placeholder="At least 6 characters"
              class="w-full px-4 py-2.5 pr-10 rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-900 text-gray-900 dark:text-gray-100 text-sm outline-none transition-colors placeholder-gray-400 dark:placeholder-gray-600"
            />
            <button type="button" (click)="showPassword = !showPassword"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 dark:text-gray-500 hover:text-gray-600 dark:hover:text-gray-300 bg-none border-none cursor-pointer text-sm p-0">
              <i [class]="showPassword ? 'fas fa-eye-slash' : 'fas fa-eye'"></i>
            </button>
          </div>
          <p *ngIf="form.get('password')?.touched && form.get('password')?.hasError('minlength')" class="text-xs text-red-500 mt-1">
            Password must be at least 6 characters
          </p>
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1.5">Confirm Password</label>
          <input
            type="password"
            formControlName="confirm"
            placeholder="Repeat your password"
            class="w-full px-4 py-2.5 rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-900 text-gray-900 dark:text-gray-100 text-sm outline-none transition-colors placeholder-gray-400 dark:placeholder-gray-600"
          />
          <p *ngIf="form.touched && form.hasError('mismatch')" class="text-xs text-red-500 mt-1">
            Passwords do not match
          </p>
        </div>

        <button type="submit" [disabled]="loading || form.invalid"
          class="w-full flex items-center justify-center gap-2 py-3 rounded-lg text-white text-sm font-semibold transition-opacity disabled:opacity-60 disabled:cursor-not-allowed mt-2"
          style="background: var(--accent-600)"
        >
          <div *ngIf="loading" class="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
          <span *ngIf="!loading">Create Password &amp; Activate Account</span>
          <span *ngIf="loading">Activating…</span>
        </button>
      </form>
    </ng-container>
  </div>
</div>
