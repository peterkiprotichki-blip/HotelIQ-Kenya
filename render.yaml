databases:
  - name: smartseason-db
    plan: free

services:
  - type: web
    name: smartseason-backend
    runtime: node
    plan: free
    rootDir: smartseason-backend
    buildCommand: npm install && npm run prisma:generate && npm run build
    startCommand: npm run prisma:deploy && npm run start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: smartseason-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION
        value: 24h
      - key: FRONTEND_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false

  - type: static
    name: smartseason-frontend
    rootDir: smartseason-frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist/smartseason-frontend/browser
    envVars:
      - key: NODE_VERSION
        value: 20
    routes:
      - type: rewrite
        source: /api/*
        destination: https://smartseason-backend.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html