<div class="min-h-screen flex items-center justify-center bg-gray-50 dark:bg-slate-900 px-4 transition-colors duration-200">
  <div class="w-full max-w-md">
    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="inline-flex w-14 h-14 rounded-2xl items-center justify-center mb-4" [style.background-color]="themeService.accent">
        <i class="fas fa-hotel text-white text-2xl"></i>
      </div>
      <h1 class="text-3xl font-bold text-gray-800 dark:text-gray-100">HotelIQ Kenya</h1>
      <p class="text-gray-500 dark:text-gray-400 mt-1">AI Revenue & Lodge Optimizer</p>
    </div>

    <!-- Card -->
    <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-lg border border-gray-200 dark:border-slate-700 p-6 sm:p-8">
      <!-- Error / Success -->
      <div *ngIf="error" class="mb-4 p-3 rounded-lg bg-red-50 dark:bg-red-900/30 border border-red-200 dark:border-red-800 text-red-700 dark:text-red-300 text-sm">
        {{ error }}
      </div>
      <div *ngIf="success" class="mb-4 p-3 rounded-lg bg-green-50 dark:bg-green-900/30 border border-green-200 dark:border-green-800 text-green-700 dark:text-green-300 text-sm">
        {{ success }}
      </div>

      <!-- Login Form -->
      <div>
        <h2 class="text-xl font-semibold text-gray-800 dark:text-gray-100 mb-6">Sign In</h2>

        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Email</label>
            <input
              type="email"
              [(ngModel)]="email"
              (keyup.enter)="login()"
              class="w-full px-3 py-2.5 rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-900 dark:text-gray-100 focus:ring-2 focus:border-transparent outline-none transition-colors"
              [style.--tw-ring-color]="themeService.accent"
              placeholder="your@email.com"
            />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Password</label>
            <div class="relative">
              <input
                [type]="showLoginPassword ? 'text' : 'password'"
                [(ngModel)]="password"
                (keyup.enter)="login()"
                class="w-full rounded-lg border border-gray-300 bg-white px-3 py-2.5 pr-10 text-gray-900 outline-none transition-colors focus:ring-2 focus:border-transparent dark:border-slate-600 dark:bg-slate-700 dark:text-gray-100"
                placeholder="••••••••"
              />
              <button
                type="button"
                (click)="showLoginPassword = !showLoginPassword"
                class="absolute inset-y-0 right-0 flex items-center px-3 text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200"
                [attr.aria-label]="showLoginPassword ? 'Hide password' : 'Show password'"
                [attr.title]="showLoginPassword ? 'Hide password' : 'Show password'"
              >
                <i class="fas" [class.fa-eye]="!showLoginPassword" [class.fa-eye-slash]="showLoginPassword"></i>
              </button>
            </div>
          </div>
          <button
            (click)="login()"
            [disabled]="loading"
            class="w-full py-2.5 rounded-lg text-white font-medium transition-opacity"
            [style.background-color]="themeService.accent"
            [class.opacity-50]="loading"
          >
            <span *ngIf="!loading">Sign In</span>
            <span *ngIf="loading"><i class="fas fa-spinner fa-spin mr-2"></i>Signing in...</span>
          </button>
        </div>

        <!-- Divider -->
        <div class="flex items-center my-6">
          <div class="flex-1 border-t border-gray-200 dark:border-slate-700"></div>
          <span class="px-3 text-sm text-gray-400 dark:text-gray-500">or</span>
          <div class="flex-1 border-t border-gray-200 dark:border-slate-700"></div>
        </div>

        <!-- Google Login -->
        <button
          (click)="googleLogin()"
          class="w-full py-2.5 rounded-lg border border-gray-300 dark:border-slate-600 text-gray-700 dark:text-gray-300 font-medium hover:bg-gray-50 dark:hover:bg-slate-700 transition-colors flex items-center justify-center gap-2"
        >
          <i class="fab fa-google"></i> Sign in with Google
        </button>

        <!-- Guest Portal Public Link -->
        <div class="mt-3">
          <a
            href="/book"
            class="w-full py-2.5 rounded-lg bg-cyan-600 hover:bg-cyan-700 text-white font-medium transition-colors flex items-center justify-center gap-2 shadow-sm"
          >
            <i class="fas fa-compass"></i> Explore Eldoret Hotels & Events
          </a>
        </div>

        <p class="text-center text-sm text-gray-500 dark:text-gray-400 mt-6">
          Don't have an account?
          <button (click)="showSignupDisabledNotice()" class="font-medium hover:underline" [style.color]="themeService.accent">Sign up</button>
        </p>
      </div>
    </div>
  </div>
</div>
