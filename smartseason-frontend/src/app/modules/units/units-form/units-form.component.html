<!-- Modal Backdrop -->
<div *ngIf="isOpen" class="fixed inset-0 z-40 bg-black/50 transition-opacity"></div>

<!-- Modal -->
<div *ngIf="isOpen" class="fixed inset-0 z-50 flex items-center justify-center p-4">
  <div class="bg-white dark:bg-slate-800 rounded-xl max-w-2xl w-full max-h-[90vh] overflow-y-auto shadow-lg border border-gray-200 dark:border-slate-700 animate-in fade-in zoom-in-95 duration-200">
    <!-- Header -->
    <div class="sticky top-0 z-10 flex items-center justify-between p-6 border-b border-gray-200 dark:border-slate-700 bg-white dark:bg-slate-800">
      <h2 class="text-lg font-semibold text-gray-900 dark:text-white">
        {{ isEditMode ? 'Edit Unit' : 'Create New Unit' }}
      </h2>
      <button
        (click)="closeModal()"
        [disabled]="loading"
        class="text-gray-500 hover:text-gray-700 dark:hover:text-gray-300 transition-colors"
      >
        <i class="fas fa-times text-lg"></i>
      </button>
    </div>

    <!-- Content -->
    <div class="p-6 space-y-4">
      <!-- Error Message -->
      <div *ngIf="error" class="p-3 rounded-lg bg-red-50 dark:bg-red-900/20 text-red-700 dark:text-red-400 text-sm border border-red-200 dark:border-red-800">
        <i class="fas fa-exclamation-circle mr-2"></i>{{ error }}
      </div>

      <!-- Property Selection -->
      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
          Property <span class="text-red-500">*</span>
        </label>
        <div *ngIf="isEditMode" class="px-3 py-2 rounded-lg border border-gray-300 dark:border-slate-600 bg-gray-50 dark:bg-slate-700 text-gray-900 dark:text-gray-100 text-sm">
          <p class="font-medium">{{ getPropertyName() }}</p>
          <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">Cannot change property for existing unit</p>
        </div>
        <select
          *ngIf="!isEditMode"
          [(ngModel)]="form.propertyId"
          (change)="onPropertyChange()"
          [disabled]="loading || loadingProperties"
          class="w-full px-3 py-2 rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-900 dark:text-gray-100 text-sm outline-none focus:ring-2 focus:ring-offset-0"
        >
          <option value="">-- Select a Property --</option>
          <option *ngFor="let prop of properties" [value]="prop._id">
            {{ prop.name }} ({{ prop.address }})
          </option>
        </select>
        <div *ngIf="loadingProperties && !isEditMode" class="text-sm text-gray-500 dark:text-gray-400 mt-2">
          <i class="fas fa-spinner fa-spin mr-1"></i> Loading properties...
        </div>
      </div>

      <!-- Unit Number & Unit Type -->
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
            Unit Name <span class="text-red-500">*</span>
          </label>
          <input
            [(ngModel)]="form.unitNumber"
            type="text"
            placeholder="e.g., 101, Unit A"
            [disabled]="loading"
            class="w-full px-3 py-2 rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-900 dark:text-gray-100 text-sm outline-none focus:ring-2 focus:ring-offset-0"
            [style.--tw-ring-color]="themeService.accent + '33'"
          />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Unit Type</label>
          <select
            [(ngModel)]="form.unitType"
            [disabled]="loading"
            class="w-full px-3 py-2 rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-900 dark:text-gray-100 text-sm outline-none focus:ring-2 focus:ring-offset-0"
            [style.--tw-ring-color]="themeService.accent + '33'"
          >
            <option *ngFor="let type of unitTypeOptions" [value]="type">
              {{ type === 'bedsitter' ? 'Bedsitter' :
                 type === 'single_room' ? 'Single Room' : 
                 type === 'one_bedroom' ? '1 Bedroom' :
                 type === 'two_bedroom' ? '2 Bedrooms' :
                 type === 'three_bedroom' ? '3 Bedrooms' : type | titlecase }}
            </option>
          </select>
        </div>
      </div>

      <!-- Floor & Rent Cycle -->
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Floor</label>
          <select
            [(ngModel)]="form.floor"
            [disabled]="loading"
            class="w-full px-3 py-2 rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-900 dark:text-gray-100 text-sm outline-none focus:ring-2 focus:ring-offset-0"
            [style.--tw-ring-color]="themeService.accent + '33'"
          >
            <option *ngFor="let floor of floorOptions" [value]="floor">
              {{ floor === 'G' ? 'Ground Floor (G)' : floor + (floor === 1 ? 'st' : floor === 2 ? 'nd' : floor === 3 ? 'rd' : 'th') + ' Floor' }}
            </option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Rent Cycle</label>
          <select
            [(ngModel)]="form.rentCycle"
            [disabled]="loading"
            class="w-full px-3 py-2 rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-900 dark:text-gray-100 text-sm outline-none focus:ring-2 focus:ring-offset-0"
            [style.--tw-ring-color]="themeService.accent + '33'"
          >
            <option *ngFor="let cycle of rentCycleOptions" [value]="cycle">
              {{ cycle === 'monthly' ? 'Monthly' :
                 cycle === 'quarterly' ? 'Quarterly' :
                 cycle === 'annual' ? 'Annual' : cycle | titlecase }}
            </option>
          </select>
        </div>
      </div>

      <!-- Rent Amount & Security Deposit -->
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
            Rent Amount <span class="text-red-500">*</span>
          </label>
          <div class="flex gap-2">
            <input
              [(ngModel)]="form.currency"
              type="text"
              placeholder="KES"
              [disabled]="loading"
              maxlength="3"
              class="w-20 px-2 py-2 rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-900 dark:text-gray-100 text-sm outline-none focus:ring-2 focus:ring-offset-0 uppercase"
              [style.--tw-ring-color]="themeService.accent + '33'"
            />
            <input
              [(ngModel)]="form.rentAmount"
              type="number"
              placeholder="0"
              [disabled]="loading"
              class="flex-1 px-3 py-2 rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-900 dark:text-gray-100 text-sm outline-none focus:ring-2 focus:ring-offset-0"
              [style.--tw-ring-color]="themeService.accent + '33'"
            />
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Security Deposit</label>
          <input
            [(ngModel)]="form.securityDeposit"
            type="number"
            placeholder="0"
            [disabled]="loading"
            class="w-full px-3 py-2 rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-900 dark:text-gray-100 text-sm outline-none focus:ring-2 focus:ring-offset-0"
            [style.--tw-ring-color]="themeService.accent + '33'"
          />
        </div>
      </div>

      <!-- Description -->
      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Description</label>
        <textarea
          [(ngModel)]="form.description"
          placeholder="e.g., Corner unit with balcony overlooking the park"
          [disabled]="loading"
          rows="2"
          class="w-full px-3 py-2 rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-900 dark:text-gray-100 text-sm outline-none focus:ring-2 focus:ring-offset-0 resize-none"
          [style.--tw-ring-color]="themeService.accent + '33'"
        ></textarea>
      </div>

      <!-- Meters Section -->
      <div class="border-t border-gray-200 dark:border-slate-700 pt-4 mt-4">
        <h3 class="text-sm font-semibold text-gray-900 dark:text-white mb-4">Utilities & Meters</h3>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Electricity Meter Number</label>
            <input
              [(ngModel)]="form.electricityMeterNumber"
              type="text"
              placeholder="e.g., EL-00123456"
              [disabled]="loading"
              class="w-full px-3 py-2 rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-900 dark:text-gray-100 text-sm outline-none focus:ring-2 focus:ring-offset-0"
              [style.--tw-ring-color]="themeService.accent + '33'"
            />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Water Meter Number</label>
            <input
              [(ngModel)]="form.waterMeterNumber"
              type="text"
              placeholder="e.g., WM-00789012"
              [disabled]="loading"
              class="w-full px-3 py-2 rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-900 dark:text-gray-100 text-sm outline-none focus:ring-2 focus:ring-offset-0"
              [style.--tw-ring-color]="themeService.accent + '33'"
            />
          </div>
        </div>
      </div>

      <!-- Status -->
      <div class="border-t border-gray-200 dark:border-slate-700 pt-4 mt-4">
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Status</label>
        <select
          [(ngModel)]="form.status"
          [disabled]="loading"
          class="w-full px-3 py-2 rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-900 dark:text-gray-100 text-sm outline-none focus:ring-2 focus:ring-offset-0"
          [style.--tw-ring-color]="themeService.accent + '33'"
        >
          <option *ngFor="let option of statusOptions" [value]="option">{{ option | titlecase }}</option>
        </select>
      </div>
    </div>

    <!-- Footer -->
    <div class="sticky bottom-0 z-10 flex justify-end gap-3 p-6 border-t border-gray-200 dark:border-slate-700 bg-white dark:bg-slate-800">
      <button
        (click)="closeModal()"
        [disabled]="loading"
        class="px-4 py-2 rounded-lg border border-gray-300 dark:border-slate-600 text-sm text-gray-700 dark:text-gray-300 font-medium hover:bg-gray-50 dark:hover:bg-slate-700/50 transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
      >
        Cancel
      </button>
      <button
        (click)="onSubmit()"
        [disabled]="loading"
        class="px-6 py-2 rounded-lg text-white text-sm font-medium transition-opacity"
        [style.background-color]="themeService.accent"
        [class.opacity-50]="loading"
      >
        <i *ngIf="!loading" class="fas mr-2" [class.fa-plus]="!isEditMode" [class.fa-save]="isEditMode"></i>
        <i *ngIf="loading" class="fas fa-spinner fa-spin mr-2"></i>
        {{ loading ? 'Saving...' : (isEditMode ? 'Update Unit' : 'Create Unit') }}
      </button>
    </div>
  </div>
</div>
