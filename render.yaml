databases:
  - name: smartseason-db
    plan: free

services:
  - type: web
    name: smartseason-backend
    runtime: node
    plan: free
    rootDir: smartseason-backend
    buildCommand: node -e "const fs=require('fs'); const path=require('path'); const cwd=process.cwd(); const candidates=['scripts/render-build.js','smartseason-backend/scripts/render-build.js']; const script=candidates.map((candidate)=>path.resolve(cwd,candidate)).find((candidate)=>fs.existsSync(candidate)); if(!script){console.error('render-build.js not found'); process.exit(1);} require(script);"
    startCommand: node -e "const fs=require('fs'); const path=require('path'); const cwd=process.cwd(); const candidates=['scripts/render-start.js','smartseason-backend/scripts/render-start.js']; const script=candidates.map((candidate)=>path.resolve(cwd,candidate)).find((candidate)=>fs.existsSync(candidate)); if(!script){console.error('render-start.js not found'); process.exit(1);} require(script);"
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: smartseason-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION
        value: 24h
      - key: FRONTEND_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false

  - type: web
    name: smartseason-frontend
    runtime: static
    rootDir: smartseason-frontend
    buildCommand: node -e "const fs=require('fs'); const path=require('path'); const cwd=process.cwd(); const candidates=['scripts/render-build.js','smartseason-frontend/scripts/render-build.js']; const script=candidates.map((candidate)=>path.resolve(cwd,candidate)).find((candidate)=>fs.existsSync(candidate)); if(!script){console.error('render-build.js not found'); process.exit(1);} require(script);"
    staticPublishPath: dist/smartseason-frontend/browser
    envVars:
      - key: NODE_VERSION
        value: 20
    routes:
      - type: rewrite
        source: /*
        destination: /index.html