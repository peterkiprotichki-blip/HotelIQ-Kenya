<div class="chatbot-container" [class.open]="isOpen">
  <button *ngIf="!isOpen" class="chatbot-bubble" (click)="toggle()" [style.background-color]="themeService.accent">
    <i class="fas fa-robot text-lg"></i>
    <span class="sr-only">Open AI Assistant</span>
  </button>

  <div *ngIf="isOpen" class="chatbot-panel" [style.width.px]="panelWidth" [style.height.px]="panelHeight">
    <div class="chatbot-header" [style.background-color]="themeService.accent">
      <div class="flex items-center gap-2">
        <i class="fas fa-robot text-white"></i>
        <span class="font-semibold text-white truncate">HotelIQ Assistant</span>
      </div>
      <div class="flex items-center gap-1">
        <button (click)="toggle()" class="text-white hover:opacity-80 p-1">
          <i class="fas fa-times"></i>
        </button>
      </div>
    </div>

    <div class="chat-messages">
      <div *ngFor="let msg of messages" class="message-row" [class.user]="msg.role === 'user'" [class.bot]="msg.role === 'assistant'">
        <div class="message-bubble" [class.bg-user]="msg.role === 'user'" [class.bg-bot]="msg.role === 'assistant'">
          <p class="message-text">{{ msg.content }}</p>
        </div>
      </div>

      <div *ngIf="loading" class="message-row bot">
        <div class="message-bubble bg-bot">
          <div class="typing-dots">
            <span></span><span></span><span></span>
          </div>
        </div>
      </div>
    </div>

    <div class="quick-prompts" *ngIf="messages.length <= 1">
      <button
        *ngFor="let prompt of quickPrompts"
        (click)="sendQuick(prompt.action)"
        class="prompt-chip"
      >
        <i class="fas fa-bolt text-xs mr-1"></i>
        {{ prompt.label }}
      </button>
    </div>

    <div class="chatbot-input">
      <input
        type="text"
        [(ngModel)]="message"
        (keydown)="onKeyDown($event)"
        placeholder="Ask about rooms, pricing, events..."
        class="chat-input"
        [disabled]="loading"
      />
      <button
        (click)="sendMessage()"
        [disabled]="!message.trim() || loading"
        class="send-button"
        [style.background-color]="themeService.accent"
        [class.opacity-50]="!message.trim() || loading"
      >
        <i class="fas fa-paper-plane text-white text-sm"></i>
      </button>
    </div>

    <div class="resize-handle resize-top" (mousedown)="startResize('top', $event)">
      <div class="resize-grip-bar"></div>
    </div>
    <div class="resize-handle resize-left" (mousedown)="startResize('left', $event)">
      <div class="resize-grip-bar-v"></div>
    </div>
    <div class="resize-handle resize-corner" (mousedown)="startResize('corner', $event)">
      <i class="fas fa-grip-lines text-gray-400 text-xs"></i>
    </div>
  </div>
</div>
