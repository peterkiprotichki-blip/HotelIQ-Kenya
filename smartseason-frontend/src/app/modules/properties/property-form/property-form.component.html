<!-- Modal Backdrop -->
<div *ngIf="isOpen" class="fixed inset-0 z-40 bg-black/50 transition-opacity"></div>

<!-- Modal -->
<div *ngIf="isOpen" class="fixed inset-0 z-50 flex items-center justify-center p-4">
  <div class="bg-white dark:bg-slate-800 rounded-xl max-w-2xl w-full max-h-[90vh] overflow-y-auto shadow-lg border border-gray-200 dark:border-slate-700 animate-in fade-in zoom-in-95 duration-200">
    <!-- Header -->
    <div class="sticky top-0 z-10 flex items-center justify-between p-6 border-b border-gray-200 dark:border-slate-700 bg-white dark:bg-slate-800">
      <h2 class="text-lg font-semibold text-gray-900 dark:text-white">
        {{ isEditMode ? 'Edit Property' : 'Add New Property' }}
      </h2>
      <button
        (click)="closeModal()"
        [disabled]="loading"
        class="text-gray-500 hover:text-gray-700 dark:hover:text-gray-300 transition-colors"
      >
        <i class="fas fa-times text-lg"></i>
      </button>
    </div>

    <!-- Content -->
    <div class="p-6 space-y-4">
      <!-- Error Message -->
      <div *ngIf="error" class="p-3 rounded-lg bg-red-50 dark:bg-red-900/20 text-red-700 dark:text-red-400 text-sm border border-red-200 dark:border-red-800">
        <i class="fas fa-exclamation-circle mr-2"></i>{{ error }}
      </div>

      <!-- Name & Property Code -->
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Property Name <span class="text-red-500">*</span></label>
          <input type="text" [(ngModel)]="form.name" [disabled]="loading" placeholder="e.g., Greenview Estate" class="w-full px-3 py-2 rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-900 dark:text-gray-100 text-sm outline-none focus:ring-2 focus:ring-offset-0" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
            Property Code
            <span *ngIf="!isEditMode && !form.propertyCode" class="text-xs text-gray-500 dark:text-gray-400 font-normal">(Auto-generated)</span>
          </label>
          <input 
            type="text" 
            [(ngModel)]="form.propertyCode" 
            [disabled]="loading || isEditMode" 
            placeholder="Will be auto-generated" 
            class="w-full px-3 py-2 rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-900 dark:text-gray-100 text-sm outline-none focus:ring-2 focus:ring-offset-0 disabled:opacity-50 disabled:bg-gray-50 dark:disabled:bg-slate-800" 
          />
        </div>
      </div>

      <!-- Type & Status -->
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Type</label>
          <select [(ngModel)]="form.type" [disabled]="loading" class="w-full px-3 py-2 rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-900 dark:text-gray-100 text-sm outline-none focus:ring-2 focus:ring-offset-0">
            <option *ngFor="let t of typeOptions" [value]="t">{{ t | titlecase }}</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Status</label>
          <select [(ngModel)]="form.status" [disabled]="loading" class="w-full px-3 py-2 rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-900 dark:text-gray-100 text-sm outline-none focus:ring-2 focus:ring-offset-0">
            <option *ngFor="let s of statusOptions" [value]="s">{{ s | titlecase }}</option>
          </select>
        </div>
      </div>

      <!-- Address -->
      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Address <span class="text-red-500">*</span></label>
        <input type="text" [(ngModel)]="form.address" [disabled]="loading" placeholder="Street address, city, state/county" class="w-full px-3 py-2 rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-900 dark:text-gray-100 text-sm outline-none focus:ring-2 focus:ring-offset-0" />
      </div>

      <!-- Owner & Year Built & Floors -->
      <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Owner</label>
          <input type="text" [(ngModel)]="form.owner" [disabled]="loading" placeholder="Owner name" class="w-full px-3 py-2 rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-900 dark:text-gray-100 text-sm outline-none focus:ring-2 focus:ring-offset-0" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Year Built</label>
          <input type="number" [(ngModel)]="form.yearBuilt" [disabled]="loading" class="w-full px-3 py-2 rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-900 dark:text-gray-100 text-sm outline-none focus:ring-2 focus:ring-offset-0" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Number of Floors</label>
          <input type="number" [(ngModel)]="form.floors" [disabled]="loading" min="0" placeholder="0" class="w-full px-3 py-2 rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-900 dark:text-gray-100 text-sm outline-none focus:ring-2 focus:ring-offset-0" />
        </div>
      </div>

      <!-- Description -->
      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Description</label>
        <textarea [(ngModel)]="form.description" [disabled]="loading" rows="2" placeholder="Additional details about the property" class="w-full px-3 py-2 rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-900 dark:text-gray-100 text-sm outline-none resize-none focus:ring-2 focus:ring-offset-0"></textarea>
      </div>

      <!-- Amenities -->
      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Amenities</label>
        <div class="flex gap-2 mb-2">
          <input type="text" [(ngModel)]="newAmenity" (keyup.enter)="addAmenity()" [disabled]="loading" placeholder="e.g., WiFi, Pool, Gym" class="flex-1 px-3 py-2 rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-900 dark:text-gray-100 text-sm outline-none focus:ring-2 focus:ring-offset-0" />
          <button (click)="addAmenity()" [disabled]="loading" class="px-3 py-2 rounded-lg text-white text-sm font-medium transition-opacity" [style.background-color]="themeService.accent" [class.opacity-50]="loading">
            <i class="fas fa-plus"></i>
          </button>
        </div>
        <div class="flex flex-wrap gap-2">
          <span *ngFor="let a of form.amenities; let i = index" class="px-3 py-1 rounded-full text-xs font-medium bg-gray-100 dark:bg-slate-700 text-gray-700 dark:text-gray-300 flex items-center gap-1">
            {{ a }}
            <button (click)="removeAmenity(i)" [disabled]="loading" class="text-gray-400 hover:text-red-500 transition-colors">
              <i class="fas fa-times text-xs"></i>
            </button>
          </span>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="sticky bottom-0 z-10 flex justify-end gap-3 p-6 border-t border-gray-200 dark:border-slate-700 bg-white dark:bg-slate-800">
      <button
        (click)="closeModal()"
        [disabled]="loading"
        class="px-4 py-2 rounded-lg border border-gray-300 dark:border-slate-600 text-sm text-gray-700 dark:text-gray-300 font-medium hover:bg-gray-50 dark:hover:bg-slate-700/50 transition-colors"
      >
        Cancel
      </button>
      <button
        (click)="onSubmit()"
        [disabled]="loading"
        class="px-6 py-2 rounded-lg text-white text-sm font-medium transition-opacity"
        [style.background-color]="themeService.accent"
        [class.opacity-50]="loading"
      >
        <span *ngIf="!loading">{{ isEditMode ? 'Update' : 'Create' }} Property</span>
        <span *ngIf="loading"><i class="fas fa-spinner fa-spin mr-2"></i>Saving...</span>
      </button>
    </div>
  </div>
</div>
